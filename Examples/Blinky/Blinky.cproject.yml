project:
  device: :cm33_core0

  generators:
    options:
      - generator: MCUXpressoConfig
        path: ./RTE/Board_Support/MCXN947VDF_cm33_core0
        name: Board

  packs:
    - pack: ARM::CMSIS-Compiler@2.1.1
    - pack: ARM::CMSIS-RTX@5.9.0
    - pack: ARM::CMSIS@6.1.0
    - pack: NXP::FRDM-MCXN947_BSP@19.0.0
    - pack: NXP::MCXN947_DFP@19.0.0

  setups:
    - setup: Options for Layer
      processor:
        fpu: sp
        trustzone: "off"

  groups:
    - group: App
      files:
        - file: Blinky.c
    - group: Board
      files:
        - file: main.c
        - file: main.h
        - file: FRDM-MCXN947.h
        - file: retarget_stdio.c
        - file: vio_FRDM-MCXN947.c
  components:
    - component: ARM::CMSIS Driver:VIO:Custom
    - component: ARM::CMSIS-Compiler:CORE
    - component: ARM::CMSIS-Compiler:STDERR:Custom
    - component: ARM::CMSIS-Compiler:STDIN:Custom
    - component: ARM::CMSIS-Compiler:STDOUT:Custom
    - component: ARM::CMSIS:CORE
    - component: ARM::CMSIS:OS Tick:SysTick
    - component: ARM::CMSIS:RTOS2:Keil RTX5&Source
    - component: NXP::Board Support:SDK Project Template:project_template&frdmmcxn947
    - component: NXP::Device:CMSIS:MCXN947_header
    - component: NXP::Device:CMSIS:MCXN947_system
    - component: NXP::Device:SDK Drivers:clock
    - component: NXP::Device:SDK Drivers:common
    - component: NXP::Device:SDK Drivers:gpio
    - component: NXP::Device:SDK Drivers:lpflexcomm
    - component: NXP::Device:SDK Drivers:lpuart
    - component: NXP::Device:SDK Drivers:lpuart_adapter
    - component: NXP::Device:SDK Drivers:mcx_spc
    - component: NXP::Device:SDK Drivers:port
    - component: NXP::Device:SDK Drivers:reset
    - component: NXP::Device:SDK Utilities:MCXN947_linker
    - component: NXP::Device:SDK Utilities:assert_lite
    - component: NXP::Device:SDK Utilities:debug_console_lite
    - component: NXP::Device:SDK Utilities:str
    - component: NXP::Device:Startup
    - component: NXP::Device:Config Tools:Init

  linker:
    - script: RTE/Device/MCXN947VDF_cm33_core0/MCXN947_cm33_core0_flash.scf
